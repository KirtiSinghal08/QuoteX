<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote of the Day!</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">                                       
</head>
<body>
    <div class="quote-box">
        <h2>Quote of the Day!</h2>
        <blockquote id="quote">Loading...</blockquote>
        <span id="author">Loading...</span>
        <div>
            <button id="new-quote" onclick="getquote(api_url)">New Quote</button>
            <button id="tweet-btn"><img src="X.JPG" alt="X Logo">Tweet</button>
        </div>    
    </div>
<script>
    const quote = document.getElementById('quote');
    const author = document.getElementById('author');
    const api_url = "https://dummyjson.com/quotes/random";

    async function getquote(url){
        const response = await fetch(url);
        var data = await response.json();  
        quote.innerHTML = data.quote;
        author.innerHTML = data.author;
    }

    getquote(api_url);
document.getElementById("tweet-btn").addEventListener("click", () => {

    const tweetText = `"${quote.innerHTML}" — ${author.innerHTML}`;

    const twitterUrl =
    `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}`;

    window.open(twitterUrl, "Tweet Window", "width=600, height=300");

});

document.getElementById("new-quote").addEventListener("click", () => {
    getquote(api_url);
});
</script>
        
</body>
</html>
